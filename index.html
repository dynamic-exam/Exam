<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>
<body>

    <div class="info-page">
        <div class="box">
            <div class="title"></div>
            <div class="form">
                <input id="name" type="text" placeholder="Your Name">
                <input id="college" type="text" placeholder="Your College">
            </div>
            <div class="instructions">
                <ul>
                    <li>There are <span id="total"></span> multiple choice questions.</li>
                    <li>Once you click an option, you can't change it.</li>
                    <li>You will get <span id="time"></span> minutes to finish the exam.</li>
                    <li><span id="negMark"></span> mark will be deducted for each incorrect answer.</li>
                </ul>
            </div>
            <div class="btns">
                <button onclick="startExam();">Start Exam</button>
            </div>
        </div>
    </div>

    <div class="filter">
        <div class="confirm-box">
            <div class="msg">Are you sure you want to submit?</div>
            <div class="btns">
                <button id="submit" onclick="submit();hideConfirmation();">Submit</button>
                <button id="cancel" onclick="hideConfirmation();">Cancel</button>
            </div>
        </div>
    </div>

    <div class="fixed-bar">
        <div class="time">
        </div>
    </div>

    <div class="container">
        <div class="head">
            <div class="title"></div>
            <div class="time"></div>
            <div class="hr"></div>
        </div>
        <div class="report">
            <div class="marks">
                <div class="data"></div>
                <div class="text-1">Marks Obtained</div>
            </div>
            <div class="grid">
                <div class="box" id="correct">
                    <div class="p1"><i class="fa fa-check-square-o" aria-hidden="true"></i></div>
                    <div class="p2">
                        <div class="text-1">Correct</div>
                        <div class="data"></div>
                    </div>
                </div>
                <div class="box" id="incorrect">
                    <div class="p1"><i class="fa fa-times" aria-hidden="true"></i></div>
                    <div class="p2">
                        <div class="text-1">Incorrect</div>
                        <div class="data"></div>
                    </div>
                </div>
                <div class="box" id="skipped">
                    <div class="p1"><i class="fa fa-step-forward" aria-hidden="true"></i></div>
                    <div class="p2">
                        <div class="text-1">Skipped</div>
                        <div class="data"></div>
                    </div>
                </div>
                <div class="box" id="accuracy">
                    <div class="p1"><i class="fa fa-shield" aria-hidden="true"></i></div>
                    <div class="p2">
                        <div class="text-1">Accuracy</div>
                        <div class="data"></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="questions">

        </div>

        <div class="hr"></div>

        <div class="foot">
            <div class="submit-btn" onclick="showConfirmation();">
                Submit
            </div>
        </div>
    </div>



<script src="q.js"></script>
<script src="script.js"></script>
</body>
</html>
